<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Action Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #13161d;
      --border:    #1e2330;
      --border2:   #252a38;
      --text:      #c8cdd8;
      --muted:     #4a5068;
      --accent:    #00e5a0;
      --accent-dim:#00b880;
      --danger:    #ff4c6a;
      --warning:   #ffb930;
      --code-bg:   #0a0c10;
      --line:      #1a1f2e;
      --glow:      rgba(0, 229, 160, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 400px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .header.recording::before { opacity: 1; animation: scanline 2s linear infinite; }

    @keyframes scanline {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-icon {
      width: 28px; height: 28px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .brand-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.3;
    }

    .brand-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* Status pill */
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--border2);
      background: var(--bg);
      transition: all 0.3s;
    }

    .status-pill.idle   { color: var(--muted); }
    .status-pill.active { color: var(--accent); border-color: var(--accent-dim); background: rgba(0,229,160,0.05); }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-pill.active .status-dot {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse-dot 1.2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Controls ────────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .btn {
      flex: 1;
      padding: 9px 14px;
      border-radius: 6px;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover { background: var(--border); }
    .btn:active { transform: scale(0.97); }

    .btn-record {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .btn-record:hover {
      background: #00ffb3;
      box-shadow: 0 0 16px var(--glow);
    }

    .btn-stop {
      background: rgba(255,76,106,0.1);
      color: var(--danger);
      border-color: rgba(255,76,106,0.3);
    }

    .btn-stop:hover {
      background: rgba(255,76,106,0.18);
      box-shadow: 0 0 12px rgba(255,76,106,0.2);
    }

    .btn-sm {
      flex: 0 0 auto;
      padding: 6px 12px;
      font-size: 10px;
    }

    .btn-copy { color: var(--accent); border-color: rgba(0,229,160,0.2); }
    .btn-copy:hover { background: rgba(0,229,160,0.07); }

    .btn-clear { color: var(--muted); }
    .btn-clear:hover { color: var(--danger); border-color: rgba(255,76,106,0.25); }

    /* ── Event counter ───────────────────────────────────── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 16px;
      background: var(--code-bg);
      border-bottom: 1px solid var(--border);
    }

    .event-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .event-count span {
      color: var(--warning);
      font-weight: 600;
    }

    .code-actions {
      display: flex;
      gap: 6px;
    }

    /* ── Code output ─────────────────────────────────────── */
    .code-wrap {
      position: relative;
      background: var(--code-bg);
      flex: 1;
    }

    .code-output {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11.5px;
      line-height: 1.75;
      color: #8be9fd;
      padding: 14px 16px;
      height: 300px;
      overflow-y: auto;
      white-space: pre;
      overflow-x: auto;
      display: block;
    }

    .code-output::-webkit-scrollbar       { width: 4px; height: 4px; }
    .code-output::-webkit-scrollbar-track  { background: transparent; }
    .code-output::-webkit-scrollbar-thumb  { background: var(--border2); border-radius: 2px; }

    /* Syntax coloring */
    .tok-keyword  { color: #ff79c6; }
    .tok-string   { color: #f1fa8c; }
    .tok-func     { color: #50fa7b; }
    .tok-comment  { color: var(--muted); font-style: italic; }
    .tok-method   { color: #8be9fd; }
    .tok-new-line { animation: fade-in 0.25s ease; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateX(-4px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
    }

    .empty-icon { font-size: 28px; opacity: 0.4; }
    .empty-hint { font-size: 10px; opacity: 0.6; text-align: center; line-height: 1.6; }

    /* Copy toast */
    .toast {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--accent);
      color: #000;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 7px 18px;
      border-radius: 20px;
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      z-index: 100;
      letter-spacing: 0.05em;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ──────────────────────────────────────────── */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header" id="header">
    <div class="brand">
      <div class="brand-icon">⏺</div>
      <div>
        <div class="brand-name">ACTION RECORDER</div>
        <div class="brand-sub">Selenium JS Generator</div>
      </div>
    </div>
    <div class="status-pill idle" id="statusPill">
      <div class="status-dot"></div>
      <span id="statusText">IDLE</span>
    </div>
  </div>

  <!-- Record Controls -->
  <div class="controls">
    <button class="btn btn-record" id="btnToggle">▶ Start Recording</button>
  </div>

  <!-- Meta + Code Actions -->
  <div class="meta-bar">
    <div class="event-count">Events: <span id="eventCount">0</span></div>
    <div class="code-actions">
      <button class="btn btn-sm btn-copy" id="btnCopy">⎘ Copy</button>
      <button class="btn btn-sm btn-clear" id="btnClear">✕ Clear</button>
    </div>
  </div>

  <!-- Code Output -->
  <div class="code-wrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">⏺</div>
      <div>Hit <strong>Start Recording</strong>, then interact with the page</div>
      <div class="empty-hint">Clicks and form inputs will appear here<br/>as Selenium JavaScript code</div>
    </div>
    <pre class="code-output" id="codeOutput" style="display:none"></pre>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">✓ Copied to clipboard</div>

  <!-- Footer -->
  <div class="footer">
    <span>v1.0.0</span>
    <span>SELENIUM-WEBDRIVER · JS · NODE</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
